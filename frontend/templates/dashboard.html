<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Security Log Dashboard</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Security Log Analyzer Dashboard</h1>
  </header>

  <section class="metrics">
    <div>
      <h3>Total Logs</h3>
      <p id="total-logs">0</p>
    </div>
    <div>
      <h3>Suspicious Users</h3>
      <ul id="suspicious-list"></ul>
    </div>
  </section>

  <section class="logs-section">
    <h2>All Logs</h2>
    <input type="text" id="search" placeholder="Search logs..." />
    <table id="logs-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Message</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="chart-section">
    <h2>Error Logs Over Time</h2>
    <canvas id="errorChart"></canvas>
  </section>

  <script src="../static/js/script.js"></script>
</body>
</html>
