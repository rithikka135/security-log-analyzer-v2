name: Security Log Analyzer CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build Docker images
      run: |
        docker build -t security-log-analyzer-frontend ./frontend
        docker build -t security-log-analyzer-backend ./backend