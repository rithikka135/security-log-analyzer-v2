name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/security-log-analyzer-backend:latest -f ./docker/Dockerfile-backend .

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/security-log-analyzer-frontend:latest -f ./docker/Dockerfile-frontend .

      - name: Push backend Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/security-log-analyzer-backend:latest

      - name: Push frontend Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/security-log-analyzer-frontend:latest

      - name: List Docker images
        run: docker images