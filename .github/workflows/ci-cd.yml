name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 for deprecated actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Docker login (using secrets)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build backend Docker image
      - name: Build backend Docker image
        run: docker build -f ./docker/Dockerfile-backend -t rithikka135/security-log-analyzer-backend .

      # 5️⃣ Build frontend Docker image
      - name: Build frontend Docker image
        run: docker build -f ./docker/Dockerfile-frontend -t rithikka135/security-log-analyzer-frontend .

      # 6️⃣ Push images to Docker Hub
      - name: Push backend image
        run: docker push rithikka135/security-log-analyzer-backend

      - name: Push frontend image
        run: docker push rithikka135/security-log-analyzer-frontend

      # 7️⃣ Optional: Deploy locally with Docker Compose
      - name: Deploy with Docker Compose
        run: |
          docker compose -f ./docker/docker-compose.yml down
          docker compose -f ./docker/docker-compose.yml up -d --build