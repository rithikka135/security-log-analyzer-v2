version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile-backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: mysecure123
      MYSQL_DATABASE: security_logs
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: